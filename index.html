<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- 🔥 منع الزوم نهائياً -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>تقرير الشفت</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  margin: 0;
  background: #f2f2f2;
}

.container {
  padding: 15px;
  max-width: 650px;
  margin: auto;
}

h2 {
  text-align: center;
}

/* 🔥 labels */
label {
  font-weight: bold;
  font-size: 14px;
  display: block;
  margin-bottom: 6px;
}

/* 🔥 inputs */
input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px; /* مهم للموبايل */
  box-sizing: border-box;
  line-height: 1.5;
}

textarea {
  min-height: 70px;
}

/* buttons */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.add-btn {
  background: #007bff;
  color: white;
}

.copy-btn {
  background: green;
  color: white;
}

/* checkboxes */
.boxes {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.boxes label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-weight: normal;
}

/* table */
table {
  width: 100%;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

td, th {
  padding: 8px;
  text-align: center;
}

hr {
  margin: 15px 0;
}
</style>

</head>

<body>

<div class="container">

<h2>📋 تقرير الشفت</h2>

<label>تاريخ الشفت</label>
<input type="date" id="date">

<label>شو صار بالشفت</label>
<textarea id="shift"></textarea>

<label>شغلات ناقصة</label>
<textarea id="missing"></textarea>

<h3>الأكثر مبيعاً</h3>
<div id="bestBox" class="boxes"></div>

<h3>الأقل مبيعاً</h3>
<div id="worstBox" class="boxes"></div>
<br>
<label>شغلات بدها صيانة</label>
<textarea id="maintenance"></textarea>

<h3>الصوصات</h3>

<table id="table">
<tr>
<th>الصوص</th>
<th>كمية</th>
<th>تاريخ</th>
</tr>
</table>

<button class="add-btn" onclick="addSauce()">➕ إضافة صوص</button>

<hr>

<label>مين سكر الكاش</label>
<input type="text" id="cashier">

<label>مين رفع السكراب</label>
<input type="text" id="scrap">

<label>أوبريت</label>
<select id="operait">
  <option value="">اختر</option>
  <option value="100%">100%</option>
  <option value="خربان">خربان</option>
</select>

<button class="copy-btn" onclick="generate()">📋 نسخ التقرير</button>

</div>

<script>

let sauces = [
"pistachio","hazelnut","chai karak","white mocha",
"hot chocolate","spanish","salted honey","rose","lotus"
];

window.onload = () => {

  // 🔥 يبدأ فاضي كل مرة (بدون حفظ)
  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];

  document.getElementById("bestBox").innerHTML = "";
  document.getElementById("worstBox").innerHTML = "";
  document.getElementById("table").innerHTML = `
    <tr>
      <th>الصوص</th>
      <th>كمية</th>
      <th>تاريخ</th>
    </tr>
  `;

  sauces.forEach(s => {
    addRow(s);
    addCheck(s);
  });
};

// 🔥 إضافة صوص للجدول
function addRow(name="") {
  let row = document.getElementById("table").insertRow();

  row.innerHTML = `
    <td><input value="${name}"></td>
    <td><input type="number" placeholder="0"></td>
    <td><input type="text" placeholder="29/4"></td>
  `;
}

// 🔥 checkboxes
function addCheck(name){

  document.getElementById("bestBox").innerHTML += `
    <label><input type="checkbox" value="${name}"> ${name}</label>
  `;

  document.getElementById("worstBox").innerHTML += `
    <label><input type="checkbox" value="${name}"> ${name}</label>
  `;
}

// 🔥 إضافة صوص جديد
function addSauce(){
  let name = prompt("اسم الصوص:");
  if(name){
    addRow(name);
    addCheck(name);
  }
}

// 🔥 نسخ التقرير
function generate(){

  let cashier = document.getElementById("cashier").value;
  let scrap = document.getElementById("scrap").value;
  let operait = document.getElementById("operait").value;

  let date = document.getElementById("date").value;
  let shiftText = document.getElementById("shift").value;
  let missingText = document.getElementById("missing").value;
  let maintenanceText = document.getElementById("maintenance").value;

  let best = [];
  document.querySelectorAll("#bestBox input:checked")
  .forEach(c => best.push(c.value));

  let worst = [];
  document.querySelectorAll("#worstBox input:checked")
  .forEach(c => worst.push(c.value));

  let report = `
shift ${date}

شو صار بالشفت:
${shiftText}

شغلات ناقصة:
${missingText}

الأكثر مبيعاً:
${best.join(", ")}

الأقل مبيعاً:
${worst.join(", ")}

شغلات بدها صيانة:
${maintenanceText}

الصوصات:
`;

  let rows = document.getElementById("table").rows;

  for(let i=1;i<rows.length;i++){
    let inputs = rows[i].querySelectorAll("input");

    let name = inputs[0].value.trim();
    let qty = inputs[1].value.trim();
    let exp = inputs[2].value.trim();

    if(name){
      report += `${name} ${qty || 0} ${exp}\n`;
    }
  }

  report += `
مين سكر الكاش: ${cashier}
مين رفع السكراب: ${scrap}
أوبريت: ${operait}
`;

  navigator.clipboard.writeText(report);
  alert("تم النسخ ✅");
}

</script>

</body>
</html>
