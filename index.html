<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير الشفت</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  margin: 0;
  background: #f2f2f2;
}

.container {
  padding: 15px;
  max-width: 650px;
  margin: auto;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  font-size: 14px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
  box-sizing: border-box;
}

textarea {
  min-height: 60px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
}

.add-btn {
  background: #007bff;
  color: white;
}

.copy-btn {
  background: green;
  color: white;
}

.boxes {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.boxes label {
  font-size: 13px;
  font-weight: normal;
}

hr {
  margin: 15px 0;
}
</style>

</head>
<body>

<div class="container">

<h2>📋 تقرير الشفت</h2>

<label>تاريخ الشفت</label>
<input type="date" id="date">

<label>شو صار بالشفت</label>
<textarea id="shift"></textarea>

<label>شغلات ناقصة</label>
<textarea id="missing"></textarea>

<h3>الأكثر مبيعاً</h3>
<div id="bestBox" class="boxes"></div>

<h3>الأقل مبيعاً</h3>
<div id="worstBox" class="boxes"></div>
<br>
<label>شغلات بدها صيانة</label>
<textarea id="maintenance"></textarea>

<h3>الصوصات</h3>

<table id="table">
<tr>
<th>الصوص</th>
<th>كمية</th>
<th>تاريخ</th>
</tr>
</table>

<button class="add-btn" onclick="addSauce()">➕ إضافة صوص</button>

<!-- 🔥 هاد القسم صار تحت الصوصات -->
<hr>

<label>مين سكر الكاش</label>
<input type="text" id="cashier">

<label>مين رفع السكراب</label>
<input type="text" id="scrap">

<label>أوبريت</label>
<select id="operait">
  <option value="">اختر</option>
  <option value="100%">100%</option>
  <option value="خربان">خربان</option>
</select>

<button class="copy-btn" onclick="generate()">📋 نسخ التقرير</button>

</div>

<script>

let sauces = [
"pistachio","hazelnut","chai karak","white mocha",
"hot chocolate","spanish","salted honey","rose","lotus"
];

window.onload = () => {
  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];

  sauces.forEach(s => {
    addRow(s);
    addCheck(s);
  });

  loadData();
};

// 🔥 إضافة صف صوص
function addRow(name="") {
  let row = document.getElementById("table").insertRow();

  row.innerHTML = `
    <td><input value="${name}"></td>
    <td><input type="number" placeholder="0"></td>
    <td><input type="text" placeholder="29/4"></td>
  `;
}

// 🔥 إضافة checkbox
function addCheck(name){

  document.getElementById("bestBox").innerHTML += `
    <label><input type="checkbox" value="${name}"> ${name}</label>
  `;

  document.getElementById("worstBox").innerHTML += `
    <label><input type="checkbox" value="${name}"> ${name}</label>
  `;
}

// 🔥 إضافة صوص جديد
function addSauce(){
  let name = prompt("اسم الصوص:");
  if(name){
    addRow(name);
    addCheck(name);
  }
}

// 🔥 إنشاء التقرير + نسخ + تصفير
function generate(){

  let cashier = document.getElementById("cashier").value;
  let scrap = document.getElementById("scrap").value;
  let operait = document.getElementById("operait").value;

  let date = document.getElementById("date").value;
  let shiftText = document.getElementById("shift").value;
  let missingText = document.getElementById("missing").value;
  let maintenanceText = document.getElementById("maintenance").value;

  let best = [];
  document.querySelectorAll("#bestBox input:checked")
  .forEach(c => best.push(c.value));

  let worst = [];
  document.querySelectorAll("#worstBox input:checked")
  .forEach(c => worst.push(c.value));

  let report = `
shift ${date}

شو صار بالشفت:
${shiftText}

شغلات ناقصة:
${missingText}

الأكثر مبيعاً:
${best.join(", ")}

الأقل مبيعاً:
${worst.join(", ")}

شغلات بدها صيانة:
${maintenanceText}

الصوصات:
`;

  let rows = document.getElementById("table").rows;

  for(let i=1;i<rows.length;i++){
    let inputs = rows[i].querySelectorAll("input");

    let name = inputs[0].value.trim();
    let qty = inputs[1].value.trim();
    let exp = inputs[2].value.trim();

    if(name){
      report += `${name} ${qty || 0} ${exp}\n`;
    }
  }

  report += `
مين سكر الكاش: ${cashier}
مين رفع السكراب: ${scrap}
أوبريت: ${operait}
`;

  // 🔥 نسخ + بعدين تصفير
  navigator.clipboard.writeText(report).then(() => {

    alert("تم نسخ التقرير ✅");

    // تصفير كل inputs و textareas
    document.querySelectorAll("input, textarea").forEach(el => {
      if(el.type !== "checkbox") el.value = "";
    });

    // إلغاء كل الاختيارات
    document.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.checked = false;
    });

    // إعادة التاريخ لليوم
    document.getElementById("date").value =
    new Date().toISOString().split('T')[0];

  });
}

// 🔥 حفظ البيانات
function saveData(){
  localStorage.setItem("shiftData", JSON.stringify({
    cashier: cashier.value,
    scrap: scrap.value,
    operait: operait.value,
    date: date.value,
    shift: shift.value,
    missing: missing.value,
    maintenance: maintenance.value
  }));
}

// 🔥 تحميل البيانات
function loadData(){
  let data = JSON.parse(localStorage.getItem("shiftData"));
  if(!data) return;

  cashier.value = data.cashier || "";
  scrap.value = data.scrap || "";
  operait.value = data.operait || "";
  date.value = data.date || "";
  shift.value = data.shift || "";
  missing.value = data.missing || "";
  maintenance.value = data.maintenance || "";
}
</script>

</body>
</html>
