<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>تقرير الشفت</title>

<style>

body {
  font-family: Arial;
  direction: rtl;
  margin: 0;
  background: #f2f2f2;
}

.container {
  padding: 15px;
  max-width: 800px;
  margin: auto;
}

h2 {
  text-align: center;
}

label {
  font-weight: bold;
  font-size: 14px;
  display: block;
  margin-bottom: 6px;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  box-sizing: border-box;
}

textarea {
  min-height: 70px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.add-btn {
  background: #007bff;
  color: white;
}

.copy-btn {
  background: green;
  color: white;
}

/* 🔥 الأعمدة */
.row {
  display: flex;
  gap: 10px;
}

/* كل عمود */
.col {
  flex: 1;
  background: white;
  padding: 10px;
  border-radius: 10px;
}
.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  font-size: 14px;

  /* 🔥 أهم تعديل */
  white-space: nowrap;   /* يمنع كسر الكلمة */
  overflow-x: auto;      /* إذا ضاقت الشاشة يعمل سحب بدل كسر */
  -webkit-overflow-scrolling: touch;
}

.item span {
  white-space: nowrap;   /* تأكيد أن الكلمة تبقى كاملة */
}
/* 🔥 موبايل */
@media (max-width: 600px) {
  .row {
    flex-direction: column; /* يصيروا تحت بعض */
  }
}

table {
  width: 100%;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

td, th {
  padding: 8px;
  text-align: center;
}

.section-title {
  margin: 10px 0;
  font-weight: bold;
}

hr {
  margin: 15px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>📋 تقرير الشفت</h2>

<label>تاريخ الشفت</label>
<input type="date" id="date">

<label>شو صار بالشفت</label>
<textarea id="shift"></textarea>

<label>شغلات ناقصة</label>
<textarea id="missing"></textarea>

<!-- 🔥 أعمدة -->
<div class="row">

  <div class="col">
    <div class="section-title">الأكثر مبيعاً</div>
    <div id="bestList"></div>
  </div>

  <div class="col">
    <div class="section-title">الأقل مبيعاً</div>
    <div id="worstList"></div>
  </div>

</div>
<br>
<label>شغلات بدها صيانة</label>
<textarea id="maintenance"></textarea>

<h3>الصوصات</h3>

<table id="table">
<tr>
<th>الصوص</th>
<th>كمية</th>
<th>تاريخ</th>
</tr>
</table>

<button class="add-btn" onclick="addSauce()">➕ إضافة صوص</button>

<hr>

<label>مين سكر الكاش</label>
<input type="text" id="cashier">

<label>مين رفع السكراب</label>
<input type="text" id="scrap">

<label>أوبريت</label>
<select id="operait">
  <option value="">اختر</option>
  <option value="100%">100%</option>
  <option value="خربان">خربان</option>
</select>

<button class="copy-btn" onclick="generate()">📋 نسخ التقرير</button>

</div>

<script>

let sauces = [
"pistachio","hazelnut","chai karak","white mocha",
"hot chocolate","spanish","salted honey","rose","lotus"
];

window.onload = () => {

  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];

  document.getElementById("bestList").innerHTML = "";
  document.getElementById("worstList").innerHTML = "";

  document.getElementById("table").innerHTML = `
    <tr>
      <th>الصوص</th>
      <th>كمية</th>
      <th>تاريخ</th>
    </tr>
  `;

  sauces.forEach(s => {
    addRow(s);
    addCheck(s);
  });
};

// جدول
function addRow(name="") {
  let row = document.getElementById("table").insertRow();

  row.innerHTML = `
    <td><input value="${name}"></td>
    <td><input type="number" placeholder="0"></td>
    <td><input type="text" placeholder="29/4"></td>
  `;
}

// checkboxes
function addCheck(name){

  document.getElementById("bestList").innerHTML += `
    <div class="item">
      <input type="checkbox" value="${name}">
      <span>${name}</span>
    </div>
  `;

  document.getElementById("worstList").innerHTML += `
    <div class="item">
      <input type="checkbox" value="${name}">
      <span>${name}</span>
    </div>
  `;
}

// إضافة صوص
function addSauce(){
  let name = prompt("اسم الصوص:");
  if(name){
    addRow(name);
    addCheck(name);
  }
}

// نسخ التقرير
function generate(){

  let cashier = document.getElementById("cashier").value;
  let scrap = document.getElementById("scrap").value;
  let operait = document.getElementById("operait").value;

  let date = document.getElementById("date").value;
  let shiftText = document.getElementById("shift").value;
  let missingText = document.getElementById("missing").value;
  let maintenanceText = document.getElementById("maintenance").value;

  let best = [];
  document.querySelectorAll("#bestList input:checked")
  .forEach(c => best.push(c.value));

  let worst = [];
  document.querySelectorAll("#worstList input:checked")
  .forEach(c => worst.push(c.value));

  let report = `
shift ${date}

شو صار بالشفت:
${shiftText}

شغلات ناقصة:
${missingText}

الأكثر مبيعاً:
${best.join(", ")}

الأقل مبيعاً:
${worst.join(", ")}

شغلات بدها صيانة:
${maintenanceText}
`;

  navigator.clipboard.writeText(report);
  alert("تم النسخ ✅");
}

</script>

</body>
</html>
